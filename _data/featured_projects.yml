- image_url: "/img/featured/kagglekernel.png"
  name: "Early ICU Prediction for Covid19 Patients"
  description: 
    "The model predicts if patients need ICU or not within 12 hours of hospital admission,
based on their information from the first 6 hours into the admission. This is to assist
doctors in making the diagnosis early which helps with beds and resource allocation
during the pandemic.

* Dataset of COVID-19 patients from 3 hospitals in Brazil.

* Basic data analysis to figure out which **features are most important** to make the pre-
diction.

* Extra features generated from existing features to understand if a patient’s condition
is stable or not.

* AUC-ROC around **0.85** with a maximum achievement **0.89**."

  url: "https://www.kaggle.com/riyadhrazzaq/early-icu-prediction-w-basic-eda-roc-auc-0-90"

